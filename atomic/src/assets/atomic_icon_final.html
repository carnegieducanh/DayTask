<!--
=============================================================
PROMPT CHO CLAUDE CODE — PASTE VÀO TERMINAL SAU KHI MỞ FILE
=============================================================

Đọc file này và thực hiện các bước sau:

1. Trích xuất SVG code của icon nguyên tử trong file này
2. Cài dependencies nếu chưa có:
     npm install sharp png-to-ico --save-dev

3. Tạo script export-icons.mjs và chạy nó để export PNG:
   - 16x16   → src-tauri/icons/16x16.png
   - 32x32   → src-tauri/icons/32x32.png
   - 64x64   → src-tauri/icons/64x64.png
   - 128x128 → src-tauri/icons/128x128.png
   - 256x256 → src-tauri/icons/256x256.png       ← desktop icon chính
   - 256x256 → src-tauri/icons/icon.png
   - 512x512 → src-tauri/icons/512x512.png       ← HiDPI / Retina
   - 512x512 → src-tauri/icons/128x128@2x.png    ← macOS retina alias

4. Tạo file src-tauri/icons/icon.ico chứa đủ 6 kích thước:
     16 / 32 / 64 / 128 / 256 / 512 px
   dùng thư viện png-to-ico

5. THAY THẾ toàn bộ icon cũ trong src-tauri/icons/ bằng các file mới

6. Kiểm tra src-tauri/tauri.conf.json:
   - Đảm bảo trường "icon" trỏ đúng các file đã tạo
   - Nếu thiếu 512px thì thêm vào danh sách icon

7. Xoá script export-icons.mjs sau khi chạy xong

SVG SOURCE (nền trong suốt, màu #DA7756):
=============================================================
-->

<svg id="daytask-icon" viewBox="2 4 96 92" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(50,50)">
    <!-- 3 quỹ đạo ellipse kiểu React: 0° / +60° / -60° -->
    <ellipse rx="40" ry="15" fill="none" stroke="#DA7756" stroke-width="5" stroke-linecap="round"/>
    <ellipse rx="40" ry="15" fill="none" stroke="#DA7756" stroke-width="5" stroke-linecap="round" transform="rotate(60)"/>
    <ellipse rx="40" ry="15" fill="none" stroke="#DA7756" stroke-width="5" stroke-linecap="round" transform="rotate(-60)"/>
    <!-- Hạt nhân trung tâm -->
    <circle r="8" fill="#DA7756"/>
    <!-- 2 electron hai bên trên quỹ đạo ngang -->
    <circle cx="-40" cy="0" r="5.5" fill="#DA7756"/>

  </g>
</svg>
