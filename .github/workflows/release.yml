name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: atomic/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: atomic/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: atomic
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: atomic
          tagName: ${{ github.ref_name }}
          releaseName: Atomic ${{ github.ref_name }}
          releaseBody: |
            ## Atomic ${{ github.ref_name }}

            ### Cài đặt
            - **Windows**: Tải file `.msi` hoặc `-setup.exe` bên dưới

            ### Nâng cấp từ bản cũ
            App sẽ tự động phát hiện bản mới khi khởi động và hỏi bạn có muốn cập nhật không.
          releaseDraft: false
          prerelease: false
